server:
  port: 8088

spring:
  application:
    name: mypay-backend

  data:
    mongodb:
      uri: mongodb://localhost:27017/mypay
      database: mypay

  # CORS configuration
  web:
    cors:
      allowed-origins: http://localhost:4200

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:MyPayDevOnlySecretKeyForLocalDevelopment2026SecureEnough256Bits!!}
    expiration-ms: ${JWT_EXPIRATION:86400000}  # 24 hours

# CORS Configuration  
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
