<div class="auth-page">
  <div class="auth-container">
    <a routerLink="/" class="back-link">← Retour</a>
    <div class="auth-header">
      <span class="logo">💳</span>
      <h1>Inscription</h1>
      <p>Créez votre compte MyPay</p>
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">Prénom</label>
          <input type="text" id="firstName" [(ngModel)]="firstName" name="firstName"
                 placeholder="Jean" required />
        </div>
        <div class="form-group">
          <label for="lastName">Nom</label>
          <input type="text" id="lastName" [(ngModel)]="lastName" name="lastName"
                 placeholder="Dupont" required />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email"
               placeholder="votre@email.com" required />
      </div>

      <div class="form-group">
        <label for="phone">Téléphone (optionnel)</label>
        <input type="tel" id="phone" [(ngModel)]="phone" name="phone"
               placeholder="+216 XX XXX XXX" />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" [(ngModel)]="password" name="password"
               placeholder="Minimum 6 caractères" required minlength="6" />
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
        {{ loading ? 'Inscription...' : 'Créer mon compte' }}
      </button>
    </form>

    <p class="auth-footer">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
