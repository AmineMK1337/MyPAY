<div class="auth-page">
  <div class="auth-container">
    <a routerLink="/" class="back-link">← Retour</a>
    <div class="auth-header">
      <span class="logo">💳</span>
      <h1>Connexion</h1>
      <p>Accédez à votre espace MyPay</p>
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email"
               placeholder="votre@email.com" required />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" [(ngModel)]="password" name="password"
               placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <p class="auth-footer">
      Pas encore de compte ? <a routerLink="/signup">S'inscrire</a>
    </p>
  </div>
</div>
